<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchlist Heat Map</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e; --text:#e2e2f0; --text-muted:#6b6b8a; --accent:#7c6fff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; min-height:100vh; padding:24px; }
  header { display:flex; align-items:center; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
  h1 { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; letter-spacing:-0.5px; }
  .subtitle { font-size:10px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; }
  .market-pill { font-size:10px; padding:3px 10px; border-radius:20px; font-weight:600; }
  .market-open { background:#1b4332; color:#00e676; }
  .market-closed { background:#2d1b1b; color:#ff6b6b; }
  .controls { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .toggle-group { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .toggle-btn { padding:7px 16px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; border:none; cursor:pointer; background:transparent; color:var(--text-muted); transition:all 0.15s; }
  .toggle-btn.active { background:var(--accent); color:#fff; }
  .btn { padding:7px 16px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; border:1px solid var(--border); border-radius:6px; cursor:pointer; background:var(--surface); color:var(--text); transition:all 0.15s; }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .last-update { margin-left:auto; font-size:10px; color:var(--text-muted); }
  .add-bar { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
  .add-bar input { background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; padding:7px 12px; width:130px; text-transform:uppercase; outline:none; transition:border-color 0.15s; }
  .add-bar input:focus { border-color:var(--accent); }
  .add-bar input::placeholder { color:var(--text-muted); text-transform:none; }
  .btn-add { background:var(--accent); border:none; color:#fff; padding:7px 16px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; cursor:pointer; }
.cedear-check {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}
.cedear-check input { cursor: pointer; accent-color: var(--accent); }
  .proxy-status { font-size:10px; color:var(--text-muted); margin-bottom:12px; min-height:16px; }
  .proxy-status span { color:#7c6fff; }
  .legend { display:flex; align-items:center; gap:8px; margin-bottom:16px; font-size:10px; color:var(--text-muted); }
  .legend-bar { width:140px; height:6px; border-radius:3px; background:linear-gradient(to right,#ff1744,#1e1e2e,#00e676); }
  .legend-rsi { display:none; align-items:center; gap:8px; margin-bottom:16px; font-size:10px; color:var(--text-muted); }
  .legend-rsi-bar { width:200px; height:6px; border-radius:3px; background:linear-gradient(to right,#00e676,#888,#ff1744); }
  .grid { display:flex; flex-wrap:wrap; gap:6px; }
  .tile { position:relative; border-radius:8px; padding:14px 12px 10px; transition:transform 0.12s,box-shadow 0.12s; flex:0 0 130px; width:130px; overflow:hidden; border:1px solid transparent; }
  .tile:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.4); border-color:rgba(255,255,255,0.15); z-index:2; }
  .tile .remove-btn { position:absolute; top:5px; right:6px; font-size:11px; color:rgba(255,255,255,0.3); cursor:pointer; display:none; background:none; border:none; }
  .tile:hover .remove-btn { display:block; }
  .tile:hover .remove-btn:hover { color:#fff; }
  .ticker { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:#fff; line-height:1; margin-bottom:4px; }
  .pct { font-size:13px; font-weight:700; color:#fff; margin-bottom:4px; }
  .price { font-size:10px; color:rgba(255,255,255,0.65); }
  .company-name { font-size:9px; color:rgba(255,255,255,0.4); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:110px; }
  .rsi-val { font-size:22px; font-weight:700; font-family:'JetBrains Mono',monospace; color:#fff; margin-bottom:4px; line-height:1; }
  .rsi-label { font-size:9px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .rsi-bar-wrap { width:100%; height:4px; background:rgba(0,0,0,0.3); border-radius:2px; margin-bottom:4px; }
  .rsi-bar-fill { height:4px; border-radius:2px; background:rgba(255,255,255,0.8); }
  .rsi-zones { display:flex; justify-content:space-between; font-size:8px; color:rgba(255,255,255,0.4); }
  .tile.loading { background:var(--surface) !important; border-color:var(--border) !important; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .toast { position:fixed; bottom:24px; right:24px; background:var(--accent); color:#fff; padding:10px 18px; border-radius:8px; font-size:12px; opacity:0; transition:opacity 0.2s; pointer-events:none; }
  .toast.show { opacity:1; }
  .empty { color:var(--text-muted); font-size:12px; padding:40px; text-align:center; width:100%; }
.cedear-badge {
  position: absolute;
  top: 5px;
  left: 6px;
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.85);
  padding: 1px 5px;
  border-radius: 3px;
  text-transform: uppercase;
}

.chart-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  transition: height 0.25s ease;
  overflow: hidden;
  z-index: 100;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
}
.chart-panel.open { height: 65vh; }
.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  height: 44px;
}
.chart-header .ticker-label {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 14px;
  color: #fff;
}
.chart-close-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 4px;
  transition: all 0.15s;
}
.chart-close-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
.chart-panel iframe {
  width: 100%;
  height: calc(65vh - 44px);
  border: none;
}
</style>
</head>
<body>
<header>
  <h1>Watchlist Heat Map</h1>
  <span class="subtitle">Live · Yahoo Finance · v1.8</span>
  <span class="market-pill" id="market-pill">...</span>
</header>
<div class="controls">
  <div class="toggle-group">
    <button class="toggle-btn active" id="btn-price" onclick="setView('price')">Precios</button>
    <button class="toggle-btn" id="btn-rsi" onclick="setView('rsi')">RSI</button>
  </div>
  <div class="toggle-group" id="metric-group">
    <button class="toggle-btn active" id="btn-day" onclick="setMetric('day')">Hoy %</button>
    <button class="toggle-btn" id="btn-week" onclick="setMetric('week')">Semana %</button>
  </div>
  <div class="toggle-group" id="rsi-period-group" style="display:none">
    <button class="toggle-btn active" id="btn-rsi-daily" onclick="setRsiPeriod('daily')">RSI Diario</button>
    <button class="toggle-btn" id="btn-rsi-weekly" onclick="setRsiPeriod('weekly')">RSI Semanal</button>
  </div>
  <button class="btn" onclick="refreshAll()">↻ Actualizar</button>
  <span class="last-update" id="last-update">—</span>
</div>
<div class="add-bar">
  <input type="text" id="ticker-input" placeholder="Agregar ticker..." maxlength="10" onkeydown="if(event.key==='Enter') addTicker()">
  <label class="cedear-check"><input type="checkbox" id="ticker-cedear-check"> Tiene CEDEAR</label>
  <button class="btn-add" onclick="addTicker()">+ Agregar</button>
</div>
<div class="proxy-status" id="proxy-status">Conectando...</div>
<div class="legend" id="legend-price">
  <span>−10%</span><div class="legend-bar"></div><span>+10%</span>
</div>
<div class="legend-rsi" id="legend-rsi">
  <span style="color:#00e676">Sobrevendido &lt;30</span>
  <div class="legend-rsi-bar"></div>
  <span style="color:#ff6b6b">Sobrecomprado &gt;70</span>
</div>
<div class="grid" id="grid"><div class="empty">Cargando...</div></div>
<div class="chart-panel" id="chart-panel">
  <div class="chart-header">
    <span class="ticker-label" id="chart-ticker-label"></span>
    <button class="chart-close-btn" onclick="closeChart()">✕ Cerrar</button>
  </div>
  <iframe id="chart-iframe" src=""></iframe>
</div>
<div class="toast" id="toast"></div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzxSMyHXm9soBrD-_crWGROtYQ-5OxsvyJ1swR_akgeMe7yq2ox7NL40TT7z7TzShQ/exec';
const DEFAULT_TICKERS = ['AAOI','APLD','ASTS','BE','BMNR','CIFR','CLSK','COIN','CRWV','DRAM','ENPH','EOSE','HIMS','HOOD','IBIT','INFQ','IONQ','IREN','KEEL','LAC','MARA','MP','MSFT','MSTR','NBIS','NOK','NU','NVTS','OKLO','ONDS','OSCR','PAGS','PLTR','POET','RGTI','RIOT','RIVN','RKLB','SNDK','SOFI','SPOT','TE','TEM','UAMY','UNH','VIST','VST','YPF','ZETA'];

// cedearMap se llena desde Google Sheets (columna B = 'x')
let cedearMap = {};
const STORAGE_KEY = 'heatmap_v4';
const PROXIES = [
  { name:'corsproxy.io',   wrap:u=>`https://corsproxy.io/?${encodeURIComponent(u)}` },
  { name:'allorigins',     wrap:u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
  { name:'codetabs',       wrap:u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}` },
];

let tickers = [];
let metric = 'day';
let view = 'price';
let rsiPeriod = 'daily';
let dataCache = {};
let activeProxy = null;

// ── PROXY ──────────────────────────────────────────────
async function tryFetch(url) {
  if (activeProxy !== null) {
    try {
      const r = await fetch(PROXIES[activeProxy].wrap(url), {signal: AbortSignal.timeout(8000)});
      if (r.ok) return r;
      activeProxy = null;
    } catch(e) { activeProxy = null; }
  }
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const r = await fetch(PROXIES[i].wrap(url), {signal: AbortSignal.timeout(8000)});
      if (r.ok) {
        activeProxy = i;
        document.getElementById('proxy-status').innerHTML = `Via <span>${PROXIES[i].name}</span>`;
        return r;
      }
    } catch(e) { continue; }
  }
  throw new Error('Sin proxy');
}

// ── RSI Wilder ─────────────────────────────────────────
function calcRSI(closes, period=14) {
  if (closes.length < period+2) return null;
  let gains=0, losses=0;
  for (let i=1; i<=period; i++) {
    const d = closes[i]-closes[i-1];
    if (d>0) gains+=d; else losses+=Math.abs(d);
  }
  let ag=gains/period, al=losses/period;
  for (let i=period+1; i<closes.length; i++) {
    const d = closes[i]-closes[i-1];
    ag = (ag*(period-1)+(d>0?d:0))/period;
    al = (al*(period-1)+(d<0?Math.abs(d):0))/period;
  }
  if (al===0) return 100;
  return 100-(100/(1+ag/al));
}

// ── FETCH ──────────────────────────────────────────────
async function fetchTicker(ticker) {
  try {
    // range=1d interval=5m: precio intradiario reciente, mas estable que 1m
    const url1d = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=5m&range=1d`;
    const url1y = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1y`;
    const url2y = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1wk&range=2y`;
    const [r1d, r1y, r2y] = await Promise.all([tryFetch(url1d), tryFetch(url1y), tryFetch(url2y)]);
    const [j1d, j1y, j2y] = await Promise.all([r1d.json(), r1y.json(), r2y.json()]);

    const result1d = j1d?.chart?.result?.[0];
    const meta1y   = j1y?.chart?.result?.[0]?.meta;
    if (!result1d || !meta1y) throw new Error('sin datos');

    // Precio actual = ultimo close no-null del array intradiario (mas confiable que meta)
    const closesIntraday = (result1d?.indicators?.quote?.[0]?.close || []).filter(v => v != null);
    const price = closesIntraday.length > 0 ? closesIntraday[closesIntraday.length - 1] : result1d.meta.regularMarketPrice;

    // Previous close oficial: chartPreviousClose del endpoint 1d (cierre de ayer)
    const prevClose = result1d.meta.chartPreviousClose;
    const dayPct = prevClose ? ((price - prevClose) / prevClose) * 100 : null;

    const c1y = j1y?.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.filter(v=>v!=null)||[];
    const c2y = j2y?.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.filter(v=>v!=null)||[];

    const weekStart = c1y.length>=6 ? c1y[c1y.length-6] : null;
    const weekPct   = weekStart ? ((price-weekStart)/weekStart)*100 : null;

    return {ticker, price, dayPct, weekPct,
      rsi: calcRSI([...c1y, price], 14),
      rsiWeekly: calcRSI([...c2y, price], 14),
      name: meta1y.shortName||ticker, ok:true};
  } catch(e) {
    console.warn(ticker, e.message);
    return {ticker, price:null, dayPct:null, weekPct:null, rsi:null, rsiWeekly:null, name:ticker, ok:false};
  }
}

// ── COLOR ──────────────────────────────────────────────
function colorPrice(p) {
  const c=Math.max(-12,Math.min(12,p));
  if (c>=0){const t=Math.min(c/10,1);return `rgb(${Math.round(27*(1-t))},${Math.round(67+163*t)},${Math.round(50+68*t)})`;}
  else{const t=Math.min(Math.abs(c)/10,1);return `rgb(${Math.round(30+225*t)},${Math.round(18+5*t)},${Math.round(25+43*t)})`;}
}
function colorRSI(r) {
  if (r<=30){const t=r/30;return `rgb(${Math.round(0+27*t)},${Math.round(150+80*(1-t))},${Math.round(80+40*(1-t))})`;}
  if (r>=70){const t=(r-70)/30;return `rgb(${Math.round(180+75*t)},${Math.round(40*(1-t))},${Math.round(40*(1-t))})`;}
  const t=(r-30)/40;return `rgb(${Math.round(60+60*t)},${Math.round(60+20*(1-t))},${Math.round(80+20*t)})`;
}
function fmtPct(v){if(v==null||isNaN(v))return'—';return(v>=0?'+':'')+v.toFixed(2)+'%';}
function rsiTag(r){if(r==null)return'';if(r<=30)return'Sobrevendido';if(r>=70)return'Sobrecomprado';return'Neutral';}

// ── RENDER ─────────────────────────────────────────────
function renderGrid(loading=false) {
  const grid = document.getElementById('grid');
  if (!tickers.length){grid.innerHTML='<div class="empty">Agregá tickers</div>';return;}
  grid.innerHTML = tickers.map(ticker => {
    const d = dataCache[ticker];
    if (loading||!d) return `<div class="tile loading"><div class="ticker">${ticker}</div><div class="pct" style="color:var(--text-muted);font-size:10px">cargando…</div></div>`;
    if (!d.ok) return `<div class="tile" style="background:#1a0e1e;border-color:#3a1a40"><button class="remove-btn" onclick="removeTicker('${ticker}')">✕</button><div class="ticker" style="color:#777">${ticker}</div><div class="pct" style="font-size:10px;color:#555">sin datos</div></div>`;

    const cedearBadge = cedearMap[ticker] ? '<span class="cedear-badge">CD</span>' : '';

    if (view==='rsi') {
      const rsi = rsiPeriod==='weekly' ? d.rsiWeekly : d.rsi;
      const bg  = rsi!=null ? colorRSI(rsi) : 'var(--surface)';
      return `<div class="tile" style="background:${bg};cursor:pointer" onclick="openTradingView('${ticker}', event)">
        ${cedearBadge}
        <button class="remove-btn" onclick="removeTicker('${ticker}'); event.stopPropagation();">✕</button>
        <div class="ticker">${ticker}</div>
        <div class="rsi-val">${rsi!=null?rsi.toFixed(1):'—'}</div>
        <div class="rsi-label">RSI 14 ${rsiPeriod==='weekly'?'Semanal':'Diario'} · ${rsiTag(rsi)}</div>
        <div class="rsi-bar-wrap"><div class="rsi-bar-fill" style="width:${rsi||0}%"></div></div>
        <div class="rsi-zones"><span>0</span><span>30</span><span>70</span><span>100</span></div>
      </div>`;
    }

    const pct = metric==='day' ? d.dayPct : d.weekPct;
    const bg  = pct!=null ? colorPrice(pct) : 'var(--surface)';
    return `<div class="tile" style="background:${bg};cursor:pointer" onclick="openTradingView('${ticker}', event)">
      ${cedearBadge}
      <button class="remove-btn" onclick="removeTicker('${ticker}'); event.stopPropagation();">✕</button>
      <div class="ticker">${ticker}</div>
      <div class="pct">${fmtPct(pct)}</div>
      <div class="price">${d.price?'$'+d.price.toFixed(2):''}</div>
      <div class="company-name">${d.name}</div>
    </div>`;
  }).join('');
}

// ── REFRESH ────────────────────────────────────────────
async function refreshAll() {
  updateMarketPill();
  renderGrid(true);
  const batchSize = 4;
  for (let i=0; i<tickers.length; i+=batchSize) {
    const batch = tickers.slice(i, i+batchSize);
    const results = await Promise.all(batch.map(t=>fetchTicker(t)));
    results.forEach(r=>{ dataCache[r.ticker]=r; });
    renderGrid(false);
    if (i+batchSize<tickers.length) await new Promise(r=>setTimeout(r,400));
  }
  document.getElementById('last-update').textContent =
    'Actualizado '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}

// ── VIEWS ──────────────────────────────────────────────
function setView(v) {
  view=v;
  document.getElementById('btn-price').classList.toggle('active',v==='price');
  document.getElementById('btn-rsi').classList.toggle('active',v==='rsi');
  document.getElementById('metric-group').style.display=v==='price'?'':'none';
  document.getElementById('rsi-period-group').style.display=v==='rsi'?'':'none';
  document.getElementById('legend-price').style.display=v==='price'?'flex':'none';
  document.getElementById('legend-rsi').style.display=v==='rsi'?'flex':'none';
  renderGrid();
}
function setMetric(m) {
  metric=m;
  document.getElementById('btn-day').classList.toggle('active',m==='day');
  document.getElementById('btn-week').classList.toggle('active',m==='week');
  renderGrid();
}
function setRsiPeriod(p) {
  rsiPeriod=p;
  document.getElementById('btn-rsi-daily').classList.toggle('active',p==='daily');
  document.getElementById('btn-rsi-weekly').classList.toggle('active',p==='weekly');
  renderGrid();
}

// ── MARKET PILL ────────────────────────────────────────
function updateMarketPill() {
  const ny=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  const d=ny.getDay(), m=ny.getHours()*60+ny.getMinutes();
  const open=d>=1&&d<=5&&m>=570&&m<960;
  const pill=document.getElementById('market-pill');
  pill.textContent=open?'● Mercado abierto':'● Mercado cerrado';
  pill.className='market-pill '+(open?'market-open':'market-closed');
}

// ── TICKERS ────────────────────────────────────────────
function saveTickers() {
  tickers.sort();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tickers));
}
async function sheetsAdd(ticker, cedear) {
  try { await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({action:'add',ticker,cedear})}); } catch(e){}
}
async function sheetsRemove(ticker) {
  try { await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({action:'remove',ticker})}); } catch(e){}
}
async function loadFromSheets() {
  try {
    const res = await fetch(SHEETS_URL, {redirect:'follow'});
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if (Array.isArray(data)&&data.length>0) {
      // Nuevo formato: [{ticker, cedear}, ...]
      if (typeof data[0] === 'object' && data[0].ticker) {
        tickers = data.map(d => d.ticker).sort();
        cedearMap = {};
        data.forEach(d => { cedearMap[d.ticker] = d.cedear; });
      } else {
        // Formato viejo: array de strings, sin info de cedear
        tickers = data.sort();
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tickers));
      localStorage.setItem(STORAGE_KEY+'_cedear', JSON.stringify(cedearMap));
      return;
    }
  } catch(e) { console.warn('Sheets:', e.message); }
  const saved = localStorage.getItem(STORAGE_KEY);
  const savedCedear = localStorage.getItem(STORAGE_KEY+'_cedear');
  tickers = (JSON.parse(saved||'null')||[...DEFAULT_TICKERS]).sort();
  cedearMap = JSON.parse(savedCedear||'{}');
}

async function addTicker() {
  const input=document.getElementById('ticker-input');
  const cedearCheck=document.getElementById('ticker-cedear-check');
  const raw=input.value.trim().toUpperCase();
  const hasCedear=cedearCheck.checked;
  if (!raw) return;
  if (tickers.includes(raw)){showToast(`${raw} ya está`);input.value='';return;}
  input.value='';
  cedearCheck.checked=false;
  tickers.push(raw); saveTickers();
  cedearMap[raw]=hasCedear;
  localStorage.setItem(STORAGE_KEY+'_cedear', JSON.stringify(cedearMap));
  sheetsAdd(raw, hasCedear);
  renderGrid(false);
  const d=await fetchTicker(raw);
  dataCache[raw]=d; renderGrid(false);
  showToast(d.ok?`${raw} agregado`:`${raw}: sin datos`);
}
function removeTicker(ticker) {
  tickers=tickers.filter(t=>t!==ticker);
  delete dataCache[ticker];
  saveTickers(); sheetsRemove(ticker); renderGrid(false);
  showToast(`${ticker} eliminado`);
}
function openTradingView(ticker, ev) {
  if (ev) ev.stopPropagation();
  const panel = document.getElementById('chart-panel');
  const iframe = document.getElementById('chart-iframe');
  const label = document.getElementById('chart-ticker-label');
  // Widget embebible de TradingView (no requiere API key)
  iframe.src = `https://s.tradingview.com/widgetembed/?symbol=${ticker}&interval=D&theme=dark&style=1&toolbarbg=12121a&studies=RSI@tv-basicstudies&timezone=Etc%2FUTC-3`;
  label.textContent = ticker;
  panel.classList.add('open');
}

function closeChart() {
  const panel = document.getElementById('chart-panel');
  panel.classList.remove('open');
  setTimeout(() => { document.getElementById('chart-iframe').src = ''; }, 250);
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── INIT ───────────────────────────────────────────────
updateMarketPill();
setInterval(updateMarketPill, 30000);
loadFromSheets().then(()=>{ renderGrid(false); refreshAll(); });
setInterval(refreshAll, 60000);
</script>
